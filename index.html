<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskbar Hero - Market Redirector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #171a23;
            --border-color: #262c3e;
            --primary: #7c3aed; /* Violet */
            --primary-glow: rgba(124, 58, 237, 0.4);
            --secondary: #ec4899; /* Pink */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-main: 'Outfit', sans-serif;
            
            /* Steam colors for brand consistency */
            --steam-blue: #66c0f4;
            --steam-gradient: linear-gradient(135deg, #47bfff 0%, #1a44c2 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            overflow: hidden;
            position: relative;
        }

        /* Subtle glowing background circles for premium aesthetic */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
        }
        body::before {
            background: var(--primary);
            top: 10%;
            left: 10%;
        }
        body::after {
            background: var(--secondary);
            bottom: 10%;
            right: 10%;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c7d5e0, var(--steam-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .item-box {
            background: rgba(11, 12, 16, 0.6);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        .item-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .item-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            word-wrap: break-word;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1rem;
            background: var(--steam-gradient);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(71, 191, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .fallback {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .fallback a {
            color: var(--steam-blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .fallback a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 1.5rem 0;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 192, 244, 0.1);
            border-radius: 50%;
            border-top-color: var(--steam-blue);
            animation: spin 0.8s ease-in-out infinite;
            margin-bottom: 0.75rem;
        }

        .language-selector {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font-main);
            transition: all 0.2s;
        }

        .lang-btn.active {
            border-color: var(--steam-blue);
            color: #fff;
            background: rgba(102, 192, 244, 0.1);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <button class="lang-btn" id="lang-ru" onclick="setLanguage('ru')">RU</button>
        <button class="lang-btn" id="lang-en" onclick="setLanguage('en')">EN</button>
    </div>

    <div class="card">
        <h1 id="title-redirecting">Перенаправление в Steam</h1>
        <p class="subtitle" id="subtitle-text">Поиск предмета на Торговой площадке</p>
        
        <div class="item-box">
            <div class="item-label" id="item-label-text">Предмет</div>
            <div class="item-name" id="item-name-value">...</div>
        </div>

        <div class="loader-container" id="loading-area">
            <div class="loader"></div>
            <span style="font-size: 0.85rem; color: var(--text-muted);" id="auto-launch-text">Запускаем приложение Steam...</span>
        </div>

        <a href="#" class="btn" id="btn-manual">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle;">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5zm4 4h-2v-5h2v5zm0-6h-2V7h2v3z"/>
            </svg>
            <span id="btn-text">Открыть Steam вручную</span>
        </a>
        
        <div class="fallback">
            <span id="fallback-prefix">Если приложение не открылось автоматически, вы можете</span> <br>
            <a href="#" id="link-web" target="_blank">открыть страницу в браузере</a>.
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const itemName = params.get('q') || '';
        const appid = params.get('appid') || '3678970';
        
        // Language detection: query param -> browser locale -> default 'ru'
        let currentLang = params.get('lang');
        if (!currentLang) {
            const locale = navigator.language || navigator.userLanguage;
            currentLang = (locale && locale.toLowerCase().startsWith('ru')) ? 'ru' : 'en';
        }

        const translations = {
            ru: {
                title: "Перенаправление в Steam",
                subtitle: "Поиск предмета на Торговой площадке",
                itemLabel: "Предмет",
                autoLaunch: "Запускаем приложение Steam...",
                btnManual: "Открыть Steam вручную",
                fallbackPrefix: "Если приложение не открылось автоматически, вы можете",
                fallbackLink: "открыть страницу в браузере",
                noItem: "Предмет не указан"
            },
            en: {
                title: "Redirecting to Steam",
                subtitle: "Searching item on Community Market",
                itemLabel: "Item",
                autoLaunch: "Launching Steam client...",
                btnManual: "Open Steam manually",
                fallbackPrefix: "If the application did not launch, you can",
                fallbackLink: "open in web browser instead",
                noItem: "Item not specified"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            
            // Toggle active state on buttons
            document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            
            const t = translations[lang] || translations.en;
            
            document.getElementById('title-redirecting').textContent = t.title;
            document.getElementById('subtitle-text').textContent = t.subtitle;
            document.getElementById('item-label-text').textContent = t.itemLabel;
            document.getElementById('auto-launch-text').textContent = t.autoLaunch;
            document.getElementById('btn-text').textContent = t.btnManual;
            document.getElementById('fallback-prefix').textContent = t.fallbackPrefix;
            document.getElementById('link-web').textContent = t.fallbackLink;
            
            if (!itemName) {
                document.getElementById('item-name-value').textContent = t.noItem;
            }
        }

        // Initialize UI
        setLanguage(currentLang);

        if (itemName) {
            document.getElementById('item-name-value').textContent = itemName;
            
            const encodedItem = encodeURIComponent(itemName);
            const steamProto = `steam://openurl/https://steamcommunity.com/market/search?appid=${appid}&q=${encodedItem}`;
            const steamWeb = `https://steamcommunity.com/market/search?appid=${appid}&q=${encodedItem}`;

            document.getElementById('btn-manual').href = steamProto;
            document.getElementById('link-web').href = steamWeb;

            // Trigger deep link redirect immediately
            window.location.href = steamProto;
        }
    </script>
</body>
</html>
